<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Animated Checkbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <input type="checkbox" id="switch-control" name="switch-control" value="active">
    <label for="switch-control" class="switch-container">
        <div class="switch-base"></div>
        <div class="switch-knob">
            <div class="knob-core"></div>
            <div class="knob-shine"></div>
        </div>
    </label>

</body>
</html>
