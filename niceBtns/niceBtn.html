<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Nice Button</title>

        <link rel="stylesheet" href="niceBtn.css" />
    </head>

    <body>
        <button class="nice-btn">
            <span>Кнопка</span>
        </button>

        <button class="nice-btn" data-state="hover">
            <span>Кнопка</span>
        </button>

        <button class="nice-btn" data-state="pressed">
            <span>Кнопка</span>
        </button>

    </body>
</html>
